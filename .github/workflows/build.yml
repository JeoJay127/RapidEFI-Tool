name: Build & Release

# ── 触发规则 ────────────────────────────────────────────
# push main/master  → Alpha（自动，固定 tag "alpha"）
# workflow_dispatch → Beta（手动，固定 tag "beta"）
#                  → Stable（手动，输入版本号，生成 tag "vX.Y.Z"）
# push v* tag       → Stable（手动推 tag 也可触发）
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]       # → alpha
    tags:     [ 'v*' ]               # → stable

  workflow_dispatch:
    inputs:
      channel:
        description: '发布渠道'
        required: true
        type: choice
        options:
          - beta                     # 固定 tag "beta"
          - stable                   # tag = "v{version}"
      version:
        description: '版本号（stable 必填，如 5.1.0；beta 留空）'
        required: false
        type: string

env:
  APP_NAME: RapidEFI

# 同一 ref 的旧构建自动取消（节省 runner 资源）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # 1. 解析发布通道 & tag
  # ──────────────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      channel:    ${{ steps.info.outputs.channel }}
      tag:        ${{ steps.info.outputs.tag }}
      version:    ${{ steps.info.outputs.version }}
      fixed_tag:  ${{ steps.info.outputs.fixed_tag }}  # "true" → alpha / beta

    steps:
      - name: Resolve channel / tag / version
        id: info
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ] && [[ "${{ github.ref }}" == refs/heads/* ]]; then
            # ── Alpha：push 到分支 ──────────────────────
            CHANNEL=alpha
            TAG=alpha
            VERSION="alpha.$(date -u +%Y%m%d%H%M).${GITHUB_SHA::7}"
            FIXED_TAG=true

          elif [ "$EVENT" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # ── Stable：推送 v* tag ────────────────────
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            CHANNEL=stable
            FIXED_TAG=false

          elif [ "$EVENT" = "workflow_dispatch" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"

            if [ "$CHANNEL" = "beta" ]; then
              # ── Beta：固定 tag "beta" ─────────────────
              TAG=beta
              VERSION="beta.$(date -u +%Y%m%d%H%M).${GITHUB_SHA::7}"
              FIXED_TAG=true
            else
              # ── Stable：手动指定版本 ──────────────────
              VERSION="${{ github.event.inputs.version }}"
              if [ -z "$VERSION" ]; then
                echo "::error::stable 渠道必须填写版本号" && exit 1
              fi
              TAG="v${VERSION}"
              FIXED_TAG=false
            fi
          fi

          echo "channel=$CHANNEL"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "fixed_tag=$FIXED_TAG" >> "$GITHUB_OUTPUT"

          # Step summary
          {
            echo "### 📦 Build info"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Channel | \`$CHANNEL\` |"
            echo "| Tag | \`$TAG\` |"
            echo "| Version | \`$VERSION\` |"
            echo "| Fixed tag | \`$FIXED_TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────
  # 2. 矩阵构建：6 个组合（2 arch × 3 OS）
  # ──────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────
          - label:          Windows-x64
            runner:         windows-latest
            os:             windows
            arch:           x64
            build_dir:      build/windows/x64/runner/Release
            pkg_ext:        zip
            flutter_sdk_arch: x64      # 原生 x64 SDK
            flutter_manual: false

          - label:          Windows-arm64
            runner:         windows-11-arm
            os:             windows
            arch:           arm64
            build_dir:      build/windows/arm64/runner/Release
            pkg_ext:        zip
            flutter_sdk_arch: x64      # x64 SDK via WOW64，可编译 arm64 产物
            flutter_manual: false

          # ── Linux ──────────────────────────────────
          - label:          Linux-x64
            runner:         ubuntu-latest
            os:             linux
            arch:           x64
            build_dir:      build/linux/x64/release/bundle
            pkg_ext:        tar.gz
            flutter_sdk_arch: x64
            flutter_manual: false

          - label:          Linux-arm64
            runner:         ubuntu-24.04-arm
            os:             linux
            arch:           arm64
            build_dir:      build/linux/arm64/release/bundle
            pkg_ext:        tar.gz
            flutter_sdk_arch: arm64    # 无模拟层，必须原生 arm64 SDK
            flutter_manual: true       # subosito/flutter-action 不支持 linux arm64

          # ── macOS ──────────────────────────────────
          - label:          macOS-x64
            runner:         macos-26
            os:             macos
            arch:           x64
            build_dir:      build/macos/Build/Products/Release
            pkg_ext:        zip
            flutter_sdk_arch: x64
            flutter_manual: false

          - label:          macOS-arm64
            runner:         macos-15
            os:             macos
            arch:           arm64
            build_dir:      build/macos/Build/Products/Release
            pkg_ext:        zip
            flutter_sdk_arch: arm64
            flutter_manual: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux 系统依赖 ──────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf2.0-dev libatk1.0-dev

      # ── Flutter：action（除 Linux arm64 外全部使用）────
      - name: Setup Flutter
        if: "!matrix.flutter_manual"
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: ${{ matrix.flutter_sdk_arch }}

      # ── Flutter：手动安装（仅 Linux arm64）────────────
      # subosito/flutter-action 无法自动发现 linux/arm64 版本
      - name: Setup Flutter (Linux arm64, manual)
        if: matrix.flutter_manual
        shell: bash
        run: |
          FLUTTER_VER=$(curl -fsSL \
            "https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
h = d['current_release']['stable']
print(next(r['version'] for r in d['releases'] if r['hash'] == h))
")
          echo "Installing Flutter $FLUTTER_VER (linux/arm64)"
          URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_arm64_${FLUTTER_VER}-stable.tar.xz"
          curl -fsSL "$URL" -o flutter.tar.xz
          tar xf flutter.tar.xz -C "$HOME"
          rm flutter.tar.xz
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" config --no-analytics
          "$HOME/flutter/bin/flutter" --version

      - run: flutter pub get

      # ── 版本号写入 pubspec.yaml ─────────────────────
      # pubspec 只接受 X.Y.Z+buildNumber 格式（纯整数）
      # stable：用输入的版本号；alpha/beta：保留原有 X.Y.Z，只更新 build number
      - name: Patch pubspec version
        shell: bash
        run: |
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          if [ "$CHANNEL" = "stable" ]; then
            SEMVER="${{ needs.prepare.outputs.version }}"
          else
            # 从 pubspec.yaml 读取当前语义版本（去掉已有的 +build 部分）
            SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          sed -i.bak "s/^version: .*/version: ${SEMVER}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      # ── 构建 ───────────────────────────────────────
      - name: Build
        shell: bash
        run: flutter build ${{ matrix.os }} --release

      # ── 打包：Windows ───────────────────────────────
      - name: Package (Windows zip)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $dest = "${{ env.APP_NAME }}-${{ matrix.label }}.zip"
          Compress-Archive -Path "${{ matrix.build_dir }}\*" -DestinationPath $dest -Force

      # ── 打包：Linux ─────────────────────────────────
      - name: Package (Linux tar.gz)
        if: matrix.os == 'linux'
        run: |
          tar -czf "$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.tar.gz" \
              -C "${{ matrix.build_dir }}" .

      # ── 打包：macOS ─────────────────────────────────
      - name: Package (macOS zip)
        if: matrix.os == 'macos'
        run: |
          cd "${{ matrix.build_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.zip" *.app

      # ── 上传 ───────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}
          path: ${{ env.APP_NAME }}-${{ matrix.label }}.${{ matrix.pkg_ext }}
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # 3. 发布 Release
  #    alpha / beta：强制覆盖同名 tag & release
  #    stable      ：创建全新版本 release
  # ──────────────────────────────────────────────────────
  release:
    name: Release · ${{ needs.prepare.outputs.tag }}
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── 强制移动 alpha/beta tag 到当前 commit ────────
      - name: Force-update fixed tag
        if: needs.prepare.outputs.fixed_tag == 'true'
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      # ── 下载所有构建产物 ────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -lh dist/

      # ── alpha / beta：删除旧 release，重新创建 ───────
      #    （确保附件始终是最新构建，不残留旧文件）
      - name: Delete existing alpha/beta release
        if: needs.prepare.outputs.fixed_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
          # cleanup-tag 会删 tag，但我们上面已强制重建了，所以重新推一次
          git push origin "$TAG" --force

      # ── 创建 Release（alpha / beta）─────────────────
      - name: Create alpha/beta release
        if: needs.prepare.outputs.fixed_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          if [ "$CHANNEL" = "alpha" ]; then
            TITLE="🔬 Alpha Build"
            NOTES="自动构建（每次推送到主分支更新此 Release）。\n\n**版本快照：** \`${VERSION}\`\n**构建号：** #${{ github.run_number }}\n**Commit：** ${{ github.sha }}"
          else
            TITLE="🧪 Beta Build"
            NOTES="Beta 手动构建（每次触发 Beta 发布更新此 Release）。\n\n**版本快照：** \`${VERSION}\`\n**构建号：** #${{ github.run_number }}\n**Commit：** ${{ github.sha }}"
          fi

          gh release create "$TAG" dist/* \
            --prerelease \
            --title "$TITLE" \
            --notes "$(printf "$NOTES")"

      # ── 创建 Release（stable）───────────────────────
      - name: Create stable release
        if: needs.prepare.outputs.fixed_tag == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release create "$TAG" dist/* \
            --title "${{ env.APP_NAME }} ${TAG}" \
            --generate-notes
