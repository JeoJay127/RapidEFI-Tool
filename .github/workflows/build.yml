name: Build & Release

on:
  # 手动触发：输入版本号并选择是否为 beta
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 5.1.0，不含 v 前缀）'
        required: true
        type: string
      prerelease:
        description: '发布为 Beta（预发布）？'
        required: true
        type: boolean
        default: false

  # 推送 v* tag 时也可自动触发（可选保留）
  push:
    tags: [ 'v*' ]

env:
  APP_NAME: RapidEFI

jobs:
  # ────────────────────────────────────────────────
  # 解析版本号（统一来源）
  # ────────────────────────────────────────────────
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - name: Resolve version & tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            # push tag 触发，从 tag 名中去掉 v 前缀
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            # tag 含 - 视为预发布（如 v5.0.0-beta）
            if [[ "$TAG" == *"-"* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "### Build info" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$TAG\`"          >> "$GITHUB_STEP_SUMMARY"
          echo "- Prerelease: \`$PRERELEASE\`" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────
  # 矩阵构建：6 个组合（2 arch × 3 OS）
  # ────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────
          - label:    Windows-x64
            runner:   windows-latest
            os:       windows
            arch:     x64
            build_dir: build/windows/x64/runner/Release
            pkg_ext:  zip

          - label:    Windows-arm64
            runner:   windows-11-arm
            os:       windows
            arch:     arm64
            build_dir: build/windows/arm64/runner/Release
            pkg_ext:  zip

          # ── Linux ────────────────────────────────
          - label:    Linux-x64
            runner:   ubuntu-latest
            os:       linux
            arch:     x64
            build_dir: build/linux/x64/release/bundle
            pkg_ext:  tar.gz

          - label:    Linux-arm64
            runner:   ubuntu-24.04-arm
            os:       linux
            arch:     arm64
            build_dir: build/linux/arm64/release/bundle
            pkg_ext:  tar.gz

          # ── macOS ────────────────────────────────
          - label:    macOS-x64
            runner:   macos-13
            os:       macos
            arch:     x64
            build_dir: build/macos/Build/Products/Release
            pkg_ext:  zip

          - label:    macOS-arm64
            runner:   macos-latest
            os:       macos
            arch:     arm64
            build_dir: build/macos/Build/Products/Release
            pkg_ext:  zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux 系统依赖 ────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf2.0-dev libatk1.0-dev

      # ── Flutter 安装 ──────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ── 写入版本号到 pubspec.yaml ─────────────────
      - name: Patch version in pubspec.yaml
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i.bak "s/^version: .*/version: ${VERSION}+${{ github.run_number }}/" pubspec.yaml
          echo "Patched pubspec version → $(grep '^version:' pubspec.yaml)"

      # ── 构建 ──────────────────────────────────────
      - name: Build (${{ matrix.label }})
        shell: bash
        run: flutter build ${{ matrix.os }} --release

      # ── 打包（Windows）────────────────────────────
      - name: Package · Windows (zip)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $src  = "${{ matrix.build_dir }}"
          $dest = "${{ env.APP_NAME }}-${{ matrix.label }}.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest -Force
          Write-Host "Created $dest"

      # ── 打包（Linux）─────────────────────────────
      - name: Package · Linux (tar.gz)
        if: matrix.os == 'linux'
        run: |
          DEST="$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.tar.gz"
          tar -czf "$DEST" -C "${{ matrix.build_dir }}" .
          echo "Created $DEST"

      # ── 打包（macOS）─────────────────────────────
      - name: Package · macOS (zip)
        if: matrix.os == 'macos'
        run: |
          DEST="$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.zip"
          cd "${{ matrix.build_dir }}"
          zip -r "$DEST" *.app
          echo "Created $DEST"

      # ── 上传构建产物 ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}
          path: ${{ env.APP_NAME }}-${{ matrix.label }}.${{ matrix.pkg_ext }}
          retention-days: 7

  # ────────────────────────────────────────────────
  # 创建 GitHub Release，附上所有平台产物
  # ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "${{ env.APP_NAME }} ${{ needs.prepare.outputs.tag }}"
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
