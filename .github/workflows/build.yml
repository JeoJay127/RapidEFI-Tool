name: Build & Release

# ── 触发规则 ────────────────────────────────────────────
# push main/master  → Alpha（自动，固定 tag "alpha"）
# workflow_dispatch → Beta（手动，固定 tag "beta"）
#                  → Stable（手动，输入版本号，生成 tag "vX.Y.Z"）
# push v* tag       → Stable（手动推 tag 也可触发）
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]       # → alpha
    tags:     [ 'v*' ]               # → stable

  workflow_dispatch:
    inputs:
      channel:
        description: '发布渠道'
        required: true
        type: choice
        options:
          - beta                     # 固定 tag "beta"
          - stable                   # tag = "v{version}"
      version:
        description: '版本号（stable 必填，如 5.1.0；beta 留空）'
        required: false
        type: string

env:
  APP_NAME: RapidEFI

# 同一 ref 的旧构建自动取消（节省 runner 资源）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # 1. 解析发布通道 & tag
  # ──────────────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      channel:    ${{ steps.info.outputs.channel }}
      tag:        ${{ steps.info.outputs.tag }}
      version:    ${{ steps.info.outputs.version }}
      fixed_tag:  ${{ steps.info.outputs.fixed_tag }}  # "true" → alpha / beta

    steps:
      - name: Resolve channel / tag / version
        id: info
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ] && [[ "${{ github.ref }}" == refs/heads/* ]]; then
            # ── Alpha：push 到分支 ──────────────────────
            CHANNEL=alpha
            TAG=alpha
            VERSION="alpha.$(date -u +%Y%m%d%H%M).${GITHUB_SHA::7}"
            FIXED_TAG=true

          elif [ "$EVENT" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # ── Stable：推送 v* tag ────────────────────
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            CHANNEL=stable
            FIXED_TAG=false

          elif [ "$EVENT" = "workflow_dispatch" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"

            if [ "$CHANNEL" = "beta" ]; then
              # ── Beta：固定 tag "beta" ─────────────────
              TAG=beta
              VERSION="beta.$(date -u +%Y%m%d%H%M).${GITHUB_SHA::7}"
              FIXED_TAG=true
            else
              # ── Stable：手动指定版本 ──────────────────
              VERSION="${{ github.event.inputs.version }}"
              if [ -z "$VERSION" ]; then
                echo "::error::stable 渠道必须填写版本号" && exit 1
              fi
              TAG="v${VERSION}"
              FIXED_TAG=false
            fi
          fi

          echo "channel=$CHANNEL"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "fixed_tag=$FIXED_TAG" >> "$GITHUB_OUTPUT"

          # Step summary
          {
            echo "### 📦 Build info"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Channel | \`$CHANNEL\` |"
            echo "| Tag | \`$TAG\` |"
            echo "| Version | \`$VERSION\` |"
            echo "| Fixed tag | \`$FIXED_TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────
  # 2. 矩阵构建：6 个组合（2 arch × 3 OS）
  # ──────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.label }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────
          - label:          Windows-x64
            runner:         windows-latest
            os:             windows
            arch:           x64
            build_dir:      build/windows/x64/runner/Release
            pkg_ext:        zip
            flutter_sdk_arch: x64      # 原生 x64 SDK
            flutter_manual: false

          # Windows-arm64 暂时禁用
          # - label:          Windows-arm64
          #   runner:         windows-11-arm
          #   os:             windows
          #   arch:           arm64
          #   build_dir:      build/windows/arm64/runner/Release
          #   pkg_ext:        zip
          #   flutter_sdk_arch: x64
          #   flutter_manual: false

          # ── Linux ──────────────────────────────────
          - label:          Linux-x64
            runner:         ubuntu-latest
            os:             linux
            arch:           x64
            build_dir:      build/linux/x64/release/bundle
            pkg_ext:        tar.gz
            flutter_sdk_arch: x64
            flutter_manual: false

          # Linux-arm64 暂时禁用（ubuntu-24.04-arm runner 网络不稳定）
          # - label:          Linux-arm64
          #   runner:         ubuntu-24.04-arm
          #   os:             linux
          #   arch:           arm64
          #   build_dir:      build/linux/arm64/release/bundle
          #   pkg_ext:        tar.gz
          #   flutter_sdk_arch: arm64
          #   flutter_manual: true

          # ── macOS ──────────────────────────────────
          - label:          macOS-x64
            runner:         macos-26
            os:             macos
            arch:           x64
            build_dir:      build/macos/Build/Products/Release
            pkg_ext:        zip
            flutter_sdk_arch: x64
            flutter_manual: false

          - label:          macOS-arm64
            runner:         macos-15
            os:             macos
            arch:           arm64
            build_dir:      build/macos/Build/Products/Release
            pkg_ext:        zip
            flutter_sdk_arch: arm64
            flutter_manual: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux 系统依赖 ──────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          # ARM64 runner 用 ports.ubuntu.com 经常超时，切换到 Azure 镜像 + 强制 IPv4
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
          # sources.list（传统格式）
          sudo sed -i 's|http://ports.ubuntu.com|http://azure.ports.ubuntu.com|g' \
            /etc/apt/sources.list 2>/dev/null || true
          # ubuntu.sources（Ubuntu 24.04 DEB822 格式）
          sudo sed -i 's|http://ports.ubuntu.com|http://azure.ports.ubuntu.com|g' \
            /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true

          sudo apt-get update -y
          sudo apt-get install -y -o Acquire::Retries=3 \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf2.0-dev libatk1.0-dev

      # ── Flutter：action（除 Linux arm64 外全部使用）────
      - name: Setup Flutter
        if: "!matrix.flutter_manual"
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: ${{ matrix.flutter_sdk_arch }}

      # ── Flutter：手动安装（仅 Linux arm64）────────────
      # subosito/flutter-action 无法自动发现 linux/arm64 版本
      - name: Setup Flutter (Linux arm64, manual)
        if: matrix.flutter_manual
        shell: bash
        run: |
          BASE="https://storage.googleapis.com/flutter_infra_release/"
          JSON=$(curl -fsSL "${BASE}releases/releases_linux.json")

          # 优先从 JSON archive 字段获取 arm64 路径（最可靠，不用猜文件名格式）
          ARCHIVE=$(echo "$JSON" | jq -r '
            .current_release.stable as $h |
            .releases[] |
            select(.hash == $h) |
            select(.archive | test("arm64"; "i")) |
            .archive
          ' | head -1)

          # 回退：版本号拼 URL
          if [ -z "$ARCHIVE" ]; then
            VER=$(echo "$JSON" | jq -r \
              '.current_release.stable as $h | .releases[] | select(.hash == $h) | .version' \
              | head -1)
            ARCHIVE="releases/stable/linux/flutter_linux_arm64_${VER}-stable.tar.xz"
          fi

          echo "Downloading: ${BASE}${ARCHIVE}"
          curl -fsSL "${BASE}${ARCHIVE}" -o flutter.tar.xz
          tar xf flutter.tar.xz -C "$HOME"
          rm flutter.tar.xz
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" config --no-analytics
          "$HOME/flutter/bin/flutter" --version

      - run: flutter pub get

      # ── Windows：设置与构建目标架构匹配的 JDK ─────────
      # windows-latest 现已是 ARM64 runner，默认 JDK 也是 aarch64；
      # jni 插件链接时需要与目标架构一致的 jvm.lib，必须显式指定。
      - name: Setup Java (match build arch)
        if: matrix.os == 'windows'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          architecture: ${{ matrix.arch }}

      # ── 修复 permission_handler_windows 在 MSVC 14.51+ 下的 C2338 错误 ──
      # CMAKE_CXX_FLAGS 无法可靠传递到插件 vcxproj，直接 patch pub cache 是唯一可靠方案
      - name: Patch permission_handler_windows (MSVC coroutine compat)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $hosted = "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev"
          $dirs   = Get-ChildItem -Path $hosted -Filter "permission_handler_windows*" -Directory -ErrorAction SilentlyContinue
          foreach ($dir in $dirs) {
            $cmake = Join-Path $dir.FullName "windows\CMakeLists.txt"
            if (Test-Path $cmake) {
              $txt = Get-Content $cmake -Raw
              if ($txt -notmatch '_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS') {
                Add-Content -Path $cmake -Value "`nadd_compile_definitions(_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS)"
                Write-Host "Patched: $cmake"
              } else {
                Write-Host "Already patched: $cmake"
              }
            }
          }

      # ── 版本号写入 pubspec.yaml ─────────────────────
      # pubspec 只接受 X.Y.Z+buildNumber 格式（纯整数）
      # stable：用输入的版本号；alpha/beta：保留原有 X.Y.Z，只更新 build number
      - name: Patch pubspec version
        shell: bash
        run: |
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          if [ "$CHANNEL" = "stable" ]; then
            SEMVER="${{ needs.prepare.outputs.version }}"
          else
            # 从 pubspec.yaml 读取当前语义版本（去掉已有的 +build 部分）
            SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          sed -i.bak "s/^version: .*/version: ${SEMVER}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      # ── 构建 ───────────────────────────────────────
      - name: Build
        shell: bash
        run: flutter build ${{ matrix.os }} --release

      # ── 打包：Windows ───────────────────────────────
      - name: Package (Windows zip)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $dest = "${{ env.APP_NAME }}-${{ matrix.label }}.zip"
          Compress-Archive -Path "${{ matrix.build_dir }}\*" -DestinationPath $dest -Force

      # ── 打包：Linux ─────────────────────────────────
      - name: Package (Linux tar.gz)
        if: matrix.os == 'linux'
        run: |
          tar -czf "$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.tar.gz" \
              -C "${{ matrix.build_dir }}" .

      # ── 打包：macOS ─────────────────────────────────
      - name: Package (macOS zip)
        if: matrix.os == 'macos'
        run: |
          cd "${{ matrix.build_dir }}"
          zip -r "$GITHUB_WORKSPACE/${{ env.APP_NAME }}-${{ matrix.label }}.zip" *.app

      # ── 上传 ───────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}
          path: ${{ env.APP_NAME }}-${{ matrix.label }}.${{ matrix.pkg_ext }}
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # 3. 发布 Release
  #    alpha / beta：强制覆盖同名 tag & release（固定入口）
  #    stable      ：创建全新版本 release
  # ──────────────────────────────────────────────────────
  release:
    name: Release · ${{ needs.prepare.outputs.tag }}
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── 下载所有构建产物 ────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -lh dist/

      # ── alpha / beta：原子操作——删旧 release+tag，建新 tag，发新 release ──
      # 合并为单步，避免"先推 tag 又被 --cleanup-tag 删掉"的冗余操作
      - name: Publish alpha/beta release (overwrite)
        if: needs.prepare.outputs.fixed_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          # 1. 删除旧 release（含 tag），忽略不存在时的错误
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # 2. 强制推新 tag 到当前 commit
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -f "$TAG"
          git push origin "$TAG" --force

          # 3. 创建新 release（使用 printf '%s' 防止变量中特殊字符被解析）
          if [ "$CHANNEL" = "alpha" ]; then
            TITLE="🔬 Alpha Build"
            NOTES=$(printf '自动构建（每次推送到主分支更新此 Release）。\n\n**版本快照：** `%s`\n**构建号：** #%s\n**Commit：** %s' \
              "$VERSION" "${{ github.run_number }}" "${{ github.sha }}")
          else
            TITLE="🧪 Beta Build"
            NOTES=$(printf 'Beta 手动构建（每次触发 Beta 发布更新此 Release）。\n\n**版本快照：** `%s`\n**构建号：** #%s\n**Commit：** %s' \
              "$VERSION" "${{ github.run_number }}" "${{ github.sha }}")
          fi

          gh release create "$TAG" dist/* \
            --prerelease \
            --title "$TITLE" \
            --notes "$NOTES"

      # ── stable：创建正式版本 release ──────────────────
      - name: Publish stable release
        if: needs.prepare.outputs.fixed_tag == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release create "$TAG" dist/* \
            --title "${{ env.APP_NAME }} ${TAG}" \
            --generate-notes \
            --latest
